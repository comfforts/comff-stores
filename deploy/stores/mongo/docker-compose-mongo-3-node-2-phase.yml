# Docker Compose configuration for MongoDB 3-node replica set with 2-phase setup
# This file defines the services, volumes, and networks needed to run a MongoDB replica set locally using Docker Compose.
# The configuration is split into two phases:
# 1. Bootstrap phase: Initializes the replica set without authentication to allow for initial setup.
# 2. Secure phase: Restarts the containers with authentication and keyFile enabled for secure access.
# The setup includes three MongoDB nodes (one primary and two secondaries) and a setup container that initializes the replica set and creates the admin user.
# The configuration is designed to mirror the production environment as closely as possible, while allowing for local development and testing.

x-healthcheck: &hc
  test: ["CMD-SHELL", "mongosh --quiet --eval 'db.hello().ok' || exit 1"]
  interval: 5s
  timeout: 3s
  retries: 30

networks:
  comffnet:
    external: true

volumes:
  comff-mongo-data:
  comff-mongo-rep1-data:
  comff-mongo-rep2-data:

# ------------------------------
# PHASE 1: BOOTSTRAP (no auth)
# ------------------------------
services:
  mongo1-bootstrap:
    image: mongo:8.0
    container_name: comff-mongo
    profiles: ["bootstrap"]
    volumes:
      - comff-mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck: *hc
    command: ["mongod", "--replSet=${MONGO_REPLICA_SET_NAME}", "--bind_ip_all"]
    networks:
      comffnet:

  mongo2-bootstrap:
    profiles: ["bootstrap"]
    image: mongo:8.0
    container_name: comff-mongo-rep1
    volumes:
      - comff-mongo-rep1-data:/data/db
    healthcheck: *hc
    command: ["mongod", "--replSet=${MONGO_REPLICA_SET_NAME}", "--bind_ip_all"]
    networks:
      comffnet:
  mongo3-bootstrap:
    profiles: ["bootstrap"]
    image: mongo:8.0
    container_name: comff-mongo-rep2
    volumes:
      - comff-mongo-rep2-data:/data/db
    healthcheck: *hc
    command: ["mongod", "--replSet=${MONGO_REPLICA_SET_NAME}", "--bind_ip_all"]
    networks:
      comffnet:
  mongo-setup:
    profiles: ["bootstrap"]
    image: mongo:8.0
    container_name: comff-mongo-setup
    env_file:
      - ../../../env/mongo3n2.env
    volumes:
      - ./mongo3n2-setup.sh:/docker-entrypoint-initdb.d/mongo-setup.sh:ro
    entrypoint: ["bash", "/docker-entrypoint-initdb.d/mongo-setup.sh"]
    depends_on:
      mongo1-bootstrap: { condition: service_healthy }
      mongo2-bootstrap: { condition: service_healthy }
      mongo3-bootstrap: { condition: service_healthy }
    networks:
      comffnet:

# ------------------------------
# PHASE 2: SECURE (auth + keyFile)
# ------------------------------
  mongo1-secure:
    profiles: ["secure"]
    image: mongo:8.0
    container_name: comff-mongo
    env_file:
      - ../../../env/mongo3n2.env
    volumes:
      - comff-mongo-data:/data/db
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
      # - ./data/mongo/leader:/data/db:rw
    ports:
      - "27017:27017"
    healthcheck: *hc
    command:
      [
        "mongod",
        "--replSet=${MONGO_REPLICA_SET_NAME}",
        "--bind_ip_all",
        "--auth",
        "--keyFile=/etc/mongo-keyfile"
      ]
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 768m
    networks:
      comffnet:

  mongo2-secure:
    profiles: ["secure"]
    image: mongo:8.0
    container_name: comff-mongo-rep1
    env_file:
      - ../../../env/mongo3n2.env
    volumes:
      - comff-mongo-rep1-data:/data/db
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
      # - ./data/mongo/rep1:/data/db:rw
    healthcheck: *hc
    command:
      [
        "mongod",
        "--replSet=${MONGO_REPLICA_SET_NAME}",
        "--bind_ip_all",
        "--auth",
        "--keyFile=/etc/mongo-keyfile"
      ]
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 512m
    networks:
      comffnet:

  mongo3-secure:
    profiles: ["secure"]
    image: mongo:8.0
    container_name: comff-mongo-rep2
    env_file:
      - ../../../env/mongo3n2.env
    volumes:
      - comff-mongo-rep2-data:/data/db
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
      # - ./data/mongo/rep2:/data/db:rw
    healthcheck: *hc
    command:
      [
        "mongod",
        "--replSet=${MONGO_REPLICA_SET_NAME}",
        "--bind_ip_all",
        "--auth",
        "--keyFile=/etc/mongo-keyfile"
      ]
    deploy:
      resources:
        limits:
          memory: 768m
        reservations:
          memory: 512m
    networks:
      comffnet:
